[project]
name = "gauntlet"
version = "0.1.0"
description = "An evaluation harness for learned robot policies."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Gauntlet contributors" },
]
keywords = ["robotics", "evaluation", "policy", "mujoco", "regression-testing"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "mujoco>=3.2,<4",
    "gymnasium>=1.0,<2",
    "pydantic>=2.7,<3",
    "typer>=0.12,<1",
    "numpy>=1.26,<3",
    "pandas>=2.2,<3",
    "jinja2>=3.1,<4",
    "pyyaml>=6.0,<7",
]

[project.scripts]
gauntlet = "gauntlet.cli:app"

[project.urls]
Homepage = "https://github.com/gauntlet-eval/gauntlet"
Issues = "https://github.com/gauntlet-eval/gauntlet/issues"

# Phase 2 task 3: drift detector.
# Torch is the only heavy dep; pillow is carried along so the optional
# image-AE path (deferred follow-up) does not silently ImportError on a
# user who flips it on.
[project.optional-dependencies]
monitor = [
    "torch>=2.2,<3",
    "pillow>=10.0,<12",
]

[dependency-groups]
dev = [
    "pytest>=8.2,<9",
    "pytest-cov>=5.0,<7",
    "ruff>=0.6,<1",
    "mypy>=1.11,<2",
    "types-pyyaml>=6.0,<7",
    "pandas-stubs>=2.2,<3",
]
# Dev extras layered on top of ``dev`` for the monitor job. Matches the
# {hf,lerobot}-dev pattern the Phase 2 RFCs lay out (neither group is
# populated in this tree yet; declaring the marker + group here is the
# only thing Task 3 owns).
monitor-dev = [
    {include-group = "dev"},
    "pytest-mock>=3.12,<4",
]

[build-system]
requires = ["uv_build>=0.8.13,<0.9.0"]
build-backend = "uv_build"

# ---------- Tooling ----------

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B011"]
# The monitor torch modules put ``try: import torch`` at module scope
# to raise the install-hint before any downstream import runs. That
# forces ``from gauntlet.monitor.{ae,train,score}`` imports of the
# sibling torch-free modules (``schema``, ``entropy``) to land below
# the guard, which ruff flags as E402. The ordering is intentional.
"src/gauntlet/monitor/ae.py" = ["E402"]
"src/gauntlet/monitor/train.py" = ["E402"]
"src/gauntlet/monitor/score.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_reexport = true
disallow_untyped_defs = true
disallow_any_generics = true
files = ["src", "tests"]

# MuJoCo bindings expose a large untyped C API surface.
# Per spec §6, Any is permitted at the MuJoCo FFI boundary only.
[[tool.mypy.overrides]]
module = ["mujoco", "mujoco.*"]
ignore_missing_imports = true

# Optional / not-yet-typed deps. Trim as upstream stubs land.
[[tool.mypy.overrides]]
module = ["gymnasium", "gymnasium.*"]
ignore_missing_imports = true

# The drift-detector extras land torch / PIL only when ``uv sync --extra
# monitor`` is run. On the default (torch-free) install path mypy must
# still be able to import-check ``src/gauntlet/monitor/*.py``. These
# overrides keep ``mypy --strict`` green whether or not the extras are
# installed.
[[tool.mypy.overrides]]
module = ["torch", "torch.*", "PIL", "PIL.*"]
ignore_missing_imports = true

# ``StateAutoencoder(nn.Module)`` subclasses torch.nn.Module — typed as
# ``Any`` when the stubs are absent. mypy --strict's
# ``disallow_subclassing_any`` would flag that; we relax it only inside
# the monitor tree so the rest of the codebase keeps the strict rule.
[[tool.mypy.overrides]]
module = ["gauntlet.monitor.ae", "gauntlet.monitor.train", "gauntlet.monitor.score"]
disallow_subclassing_any = false

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "-ra",
    "--strict-config",
    "--strict-markers",
    "--cov=gauntlet",
    "--cov-report=term-missing",
]
testpaths = ["tests"]
markers = [
    "hf: tests that require the [hf] extra (torch, transformers, PIL) — reserved",
    "lerobot: tests that require the [lerobot] extra (lerobot, torch, PIL) — reserved",
    "monitor: tests that require the [monitor] extra (torch, PIL)",
]

[tool.coverage.run]
source = ["gauntlet"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
