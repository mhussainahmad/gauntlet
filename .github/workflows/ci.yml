name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: lint + mypy + pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Default job stays torch-free — this is the continuous enforcement of
      # spec §6's "no torch in the core" rule. See
      # docs/phase2-rfc-001-huggingface-policy.md §3.
      - name: Sync dependencies (no hf extra)
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy

      - name: Run tests with coverage (no hf / lerobot markers)
        run: uv run pytest -m "not hf and not lerobot"

  hf-tests:
    name: hf tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with hf extra + hf-dev group)
        run: uv sync --extra hf --group hf-dev --python ${{ matrix.python-version }}

      # hf-tests mock at the transformers ``from_pretrained`` seam — no
      # real weights downloaded, no GPU needed. See RFC §6.
      - name: Run hf tests
        run: uv run pytest -m hf

  lerobot-tests:
    name: lerobot tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with lerobot extra + lerobot-dev group)
        run: uv sync --extra lerobot --group lerobot-dev --python ${{ matrix.python-version }}

      # lerobot-tests mock at the SmolVLAPolicy.from_pretrained /
      # make_pre_post_processors seams — no real weights downloaded, no GPU
      # needed. See docs/phase2-rfc-002-lerobot-smolvla.md §6.
      - name: Run lerobot tests
        run: uv run pytest -m lerobot
