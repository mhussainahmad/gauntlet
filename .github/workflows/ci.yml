name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: lint + mypy + pytest (torch-free, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Pin every ``uv`` invocation in this job to the matrix python so
    # ``uv run`` does not fall back to the runner's system python and
    # silently recreate ``.venv`` from scratch (wiping the synced
    # packages). See PR #37 for the prior CI hotfix; this is the next
    # orthogonal failure mode that surfaced on py3.12 jobs.
    #
    # Thread caps (OMP/MKL/OPENBLAS=1) prevent BLAS / OpenMP from
    # spinning up nproc=4 worker threads inside each test process.
    # On the ubuntu-latest runner (4 logical CPUs, ~2 usable under
    # cgroup limits) the implicit thread pools collide with the
    # Runner's spawn-method multiprocessing pool — see PR
    # hotfix/ci-pytest-hang for the diagnosis (workers wedged on
    # MJCF compile during pool startup, 6h cancel). The cap also
    # makes deterministic-numerics tests cheaper without changing
    # any results.
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Default job stays torch-free and extras-free — continuous
      # enforcement of spec §6's "small deps" / "no torch in core" rule.
      # Every extras-gated suite (hf, lerobot, monitor, pybullet) is
      # de-selected; any accidental torch import in gauntlet.core would
      # trigger ModuleNotFoundError here.
      - name: Sync dependencies (no extras)
        # ``--reinstall-package gauntlet`` forces uv to rebuild the
        # editable wheel for the local project on every run. Entry-point
        # additions to ``[project.entry-points.*]`` in pyproject.toml do
        # NOT change uv.lock, so without this flag uv reuses a cached
        # editable build and the new entry-points never land in
        # ``.venv/.../gauntlet-*.dist-info/entry_points.txt``. The
        # plugin-discovery tests then see an empty registry and fail.
        run: uv sync --dev --python ${{ matrix.python-version }} --reinstall-package gauntlet

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy

      - name: Run tests (excludes extras-gated markers)
        # ``render`` covers tests that drive ``mujoco.Renderer`` and need
        # a working offscreen GL stack. The GitHub ``ubuntu-latest``
        # runner has no DISPLAY and no GPU, so the C-level renderer
        # aborts the worker — gating with the marker keeps the default
        # job clean. Run those locally via ``MUJOCO_GL=egl``.
        run: uv run pytest -m "not hf and not lerobot and not monitor and not pybullet and not genesis and not ros2 and not isaac and not video and not render"

  hf-tests:
    name: hf tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with hf extra + hf-dev group)
        run: uv sync --extra hf --group hf-dev --python ${{ matrix.python-version }} --reinstall-package gauntlet

      # hf-tests mock at the transformers ``from_pretrained`` seam — no
      # real weights downloaded, no GPU needed. See RFC-001 §6.
      - name: Run hf tests
        run: uv run pytest -m hf

  lerobot-tests:
    name: lerobot tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with lerobot extra + lerobot-dev group)
        run: uv sync --extra lerobot --group lerobot-dev --python ${{ matrix.python-version }} --reinstall-package gauntlet

      - name: Run lerobot tests
        run: uv run pytest -m lerobot

  monitor-tests:
    name: monitor-tests (torch, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with [monitor] extra + monitor-dev group)
        run: uv sync --extra monitor --group monitor-dev --python ${{ matrix.python-version }} --reinstall-package gauntlet

      - name: Run monitor-marked tests
        run: uv run pytest -m monitor

  video-tests:
    # Polish task — rollout MP4 video recording. The [video] extra pulls
    # imageio[ffmpeg], which bundles a static ffmpeg binary so no system
    # ffmpeg is needed. The job mirrors monitor-tests / pybullet-tests:
    # install the partner extra + dev group, then run only marker-gated
    # tests under tests/video/. The default job excludes the ``video``
    # marker so this is the sole runner for those tests.
    name: video-tests (imageio[ffmpeg], py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with [video] extra + video-dev group)
        run: uv sync --extra video --group video-dev --python ${{ matrix.python-version }} --reinstall-package gauntlet

      - name: Run video-marked tests
        run: uv run pytest -m video tests/video/ -q

  pybullet-tests:
    name: pybullet backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (pybullet extra + pybullet-dev group)
        run: >-
          uv sync
          --extra pybullet
          --group pybullet-dev
          --python ${{ matrix.python-version }}
          --reinstall-package gauntlet

      - name: Run pybullet-marked tests
        run: uv run pytest -m pybullet -q

  genesis-tests:
    name: genesis backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (genesis extra + genesis-dev group)
        run: >-
          uv sync
          --extra genesis
          --group genesis-dev
          --python ${{ matrix.python-version }}
          --reinstall-package gauntlet

      - name: Run genesis-marked tests
        run: uv run pytest -m genesis -q

  ros2-tests:
    name: ros2-tests (rclpy mocked, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # The [ros2] extra is empty (rclpy is NOT pip-installable in its
      # official form — RFC-010 §3 / exploration §Q2). The ros2-dev
      # group brings the dev tooling. Tests in tests/ros2/ seed
      # sys.modules["rclpy"] = MagicMock() in conftest.py, so the unit
      # tests run entirely against mocks. A real-rclpy integration job
      # (docker run osrf/ros:humble-desktop) is left to a follow-up
      # workflow_dispatch and is not required to land this task.
      - name: Sync dependencies (with [ros2] extra + ros2-dev group)
        run: >-
          uv sync
          --extra ros2
          --group ros2-dev
          --python ${{ matrix.python-version }}
          --reinstall-package gauntlet

      - name: Run ros2-marked tests (rclpy mocked at module boundary)
        run: uv run pytest -m ros2 -q

  isaac-tests:
    # Placeholder job for future GPU-runner-backed Isaac Sim tests
    # (RFC-009 §9). isaacsim wraps NVIDIA Omniverse Kit and requires a
    # CUDA RTX-class GPU at runtime; the PyPI wheel resolves on
    # ubuntu-latest but the Kit bootstrap segfaults probing for a GPU.
    # So this job is allowed to fail (continue-on-error) and the test
    # step uses a `|| [ $? -eq 5 ]` guard so a zero-collection on the
    # `isaac` marker (no real-runtime tests carry it in this PR) is
    # treated as success. The mocked default-job tests in `tests/isaac/`
    # are unmarked and run in `lint-typecheck-test` above.
    name: isaac backend tests (placeholder, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (isaac extra + isaac-dev group)
        # ~15 GB Kit binaries pulled from the NVIDIA index — slow on
        # cold cache. Allowed to fail because the GPU dependency
        # surfaces during install on some runner SKUs.
        continue-on-error: true
        run: >-
          uv sync
          --extra isaac
          --group isaac-dev
          --python ${{ matrix.python-version }}
          --reinstall-package gauntlet

      - name: Run isaac-marked tests (zero-collection tolerated)
        # No tests carry the `isaac` marker in this PR (RFC-009 §8 —
        # the marker is reserved for future GPU-runner-backed live
        # tests). pytest exits 5 when zero tests match a marker, so we
        # silence that exit code explicitly. The mocked default-job
        # tests do not need this job at all.
        continue-on-error: true
        run: |
          uv run pytest -m isaac --co -q || [ $? -eq 5 ]

  security-audit:
    # Phase 2.5 Task 16 — dependency CVE scan. ``pip-audit`` queries the
    # OSV database for known CVEs against the project's resolved
    # dependency tree (PyPI metadata + transitive deps). This is a HARD
    # GATE: any new CVE in a dependency we ship fails the build.
    #
    # OSV is preferred over the PyPI vuln service because OSV aggregates
    # multiple sources (GHSA, NVD, OSV-direct) and does not require
    # authentication. The ``--strict`` flag makes pip-audit treat
    # warnings (e.g. "skipped a dependency without metadata") as errors;
    # this catches resolver flakes that would otherwise mask a missed
    # scan.
    name: security-audit (pip-audit, OSV)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      # Resolve a venv from pyproject.toml so pip-audit sees the same
      # dep tree gauntlet itself ships. ``--no-extras`` keeps the audit
      # surface to the core dependencies; the per-extra deps (torch,
      # genesis, isaacsim) are audited in their own backend jobs by
      # virtue of being installed there.
      - name: Sync core dependencies (no extras)
        run: uv sync --dev --python 3.11 --reinstall-package gauntlet

      # Project-mode pip-audit: scans the resolved dependency tree for
      # the gauntlet project at the given path. ``--vulnerability-service
      # osv`` queries the OSV database; ``--strict`` turns dependency-
      # resolution warnings into errors so a partial scan never silently
      # passes. If a CVE lands in a pinned dep, the fix is to either
      # bump the dep in pyproject.toml or document a deferral in the
      # PR body and pass --ignore-vuln <ID> with a link.
      - name: Audit dependencies for known CVEs
        run: uvx pip-audit --strict --vulnerability-service osv .

  secret-scan:
    # Phase 2.5 Task 16 — secret-leak scan. ``detect-secrets`` greps the
    # working tree against a configurable plugin set (AWS keys, JWTs,
    # high-entropy strings, etc.) and compares findings against a
    # checked-in ``.secrets.baseline``. Any finding NOT in the baseline
    # fails the job.
    #
    # To accept a future false positive, re-run ``uvx detect-secrets
    # scan > .secrets.baseline`` from a clean tree and commit the diff
    # with a justification. The baseline must never include a real
    # credential (the audit step exists for this reason).
    name: secret-scan (detect-secrets)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so the hook scans every changed file
          # in the PR's commits, not just the head tree.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      # detect-secrets-hook is the CI-gate entry point: it accepts a list
      # of filenames + a baseline and exits non-zero on any new finding.
      # We pass every git-tracked file so the gate catches secrets in
      # newly-added files (which never appear in a diff-only scan).
      - name: Scan tracked files against baseline
        run: |
          git ls-files | xargs uvx --from detect-secrets detect-secrets-hook \
            --baseline .secrets.baseline
