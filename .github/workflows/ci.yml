name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: lint + mypy + pytest (torch-free, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Default job stays torch-free and extras-free — continuous
      # enforcement of spec §6's "small deps" / "no torch in core" rule.
      # Every extras-gated suite (hf, lerobot, monitor, pybullet) is
      # de-selected; any accidental torch import in gauntlet.core would
      # trigger ModuleNotFoundError here.
      - name: Sync dependencies (no extras)
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy

      - name: Run tests (excludes extras-gated markers)
        run: uv run pytest -m "not hf and not lerobot and not monitor and not pybullet and not genesis"

  hf-tests:
    name: hf tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with hf extra + hf-dev group)
        run: uv sync --extra hf --group hf-dev --python ${{ matrix.python-version }}

      # hf-tests mock at the transformers ``from_pretrained`` seam — no
      # real weights downloaded, no GPU needed. See RFC-001 §6.
      - name: Run hf tests
        run: uv run pytest -m hf

  lerobot-tests:
    name: lerobot tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with lerobot extra + lerobot-dev group)
        run: uv sync --extra lerobot --group lerobot-dev --python ${{ matrix.python-version }}

      - name: Run lerobot tests
        run: uv run pytest -m lerobot

  monitor-tests:
    name: monitor-tests (torch, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with [monitor] extra + monitor-dev group)
        run: uv sync --extra monitor --group monitor-dev --python ${{ matrix.python-version }}

      - name: Run monitor-marked tests
        run: uv run pytest -m monitor

  pybullet-tests:
    name: pybullet backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (pybullet extra + pybullet-dev group)
        run: >-
          uv sync
          --extra pybullet
          --group pybullet-dev
          --python ${{ matrix.python-version }}

      - name: Run pybullet-marked tests
        run: uv run pytest -m pybullet -q

  genesis-tests:
    name: genesis backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (genesis extra + genesis-dev group)
        run: >-
          uv sync
          --extra genesis
          --group genesis-dev
          --python ${{ matrix.python-version }}

      - name: Run genesis-marked tests
        run: uv run pytest -m genesis -q
